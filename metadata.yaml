    changeNotes: |2
      Initial release.
      Loads the Mailchimp Site Tracking bridge (gtm-bridge.js).
      Maps GA4 ecommerce events (view_item, add_to_cart, begin_checkout,
      purchase) to Mailchimp's PRODUCT_VIEWED, PRODUCT_ADDED_TO_CART,
      CHECKOUT_STARTED, and PURCHASED events.
      Optional identifiers: GOOGLE_CLIENT_ID, EMAIL_SHA256, PHONE_SHA256.
